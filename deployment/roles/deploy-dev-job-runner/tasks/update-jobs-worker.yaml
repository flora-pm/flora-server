---

- name: "Update development branch"
  ansible.builtin.command:
    cmd: git checkout development
    chdir: flora-server

- name: "Update development branch"
  ansible.builtin.command:
    cmd: git pull
    chdir: flora-server

- name: "Clean build artifacts"
  ansible.builtin.command:
    cmd: gmake clean
    chdir: flora-server
  environment:
    PATH: "/home/dev-jobs-1/.cabal/bin:/home/dev-jobs-1/.ghcup/bin:{{ ansible_env.PATH }}"

- name: "Update cabal index"
  ansible.builtin.command:
    cmd: cabal update
    chdir: flora-server
  environment:
    PATH: "/home/dev-jobs-1/.cabal/bin:/home/dev-jobs-1/.ghcup/bin:{{ ansible_env.PATH }}"

- name: "Build backend"
  register: build
  ansible.builtin.command:
    cmd: cabal build --no-semaphore exe:flora-jobs-runner
    chdir: flora-server
  async: 3600
  poll: 30
  environment:
    PATH: "/home/dev-jobs-1/.cabal/bin:/home/dev-jobs-1/.ghcup/bin:{{ ansible_env.PATH }}"

- name: "Schema migrations"
  register: build
  ansible.builtin.command:
    cmd: gmake db-migrate
    chdir: flora-server
  async: 3600
  poll: 30
  environment:
    PATH: "/home/dev-jobs-1/.cabal/bin:/home/dev-jobs-1/.ghcup/bin:{{ ansible_env.PATH }}"

- debug: msg="{{ build.stdout }}"
- debug: msg="{{ build.stderr }}"

- name: Kill the process
  ansible.builtin.shell:
    cmd: kill $(cat ~/.local/run/flora-jobs-runner.pid)
    chdir: flora-server
